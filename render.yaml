services:
  - type: web
    name: xgl-meeting-minutes
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 600
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
    disk:
      name: template
      mountPath: /opt/render/project/src
      sizeGB: 1
